        <h2>Contacto</h2>
        <p class="section-desc">¿Tenés un proyecto en mente? Ponete en contacto para que lo trabajemos juntos.</p>
        
        <div class="contact-container">
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" class="form-control" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Mensaje</button>
            </form>

            <div class="socials-container">
                <a href="https://linkedin.com" class="social-link" target="_blank">LinkedIn</a>
                <a href="https://behance.net" class="social-link" target="_blank">Behance</a>
            </div>
        </div>
</body>
</html>
